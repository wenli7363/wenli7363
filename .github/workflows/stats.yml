name: generate stats cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: wenli7363
          BRANCH_NAME: stats
          THEME: tokyonight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
